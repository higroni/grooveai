# GROOVE.AI - Master Configuration File
# All modules read from this single source of truth

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
global:
  project_name: "GROOVE.AI"
  version: "2.0.0"
  environment: "development"  # development, staging, production
  debug: true
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR

# =============================================================================
# DEVELOPMENT SAMPLE FILES
# =============================================================================
development:
  # Sample file for testing during development
  sample_file: "D:/POSAO/OllamaProjects/GROOVE.AI/DOCUMENTS/DEV/radni_odnosi_0001_000001.pdf"
  
  # Auto-reload
  auto_reload: true
  
  # Debug mode
  debug: true
  
  # Test data
  test_data_dir: "DOCUMENTS/DEV"
  
  # Mock services
  mock_llm: false
  mock_ner: false
  
# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
database:
  # Master database URL (can be overridden per module)
  master_url: "sqlite:///data/databases/grooveai_master.db"
  
  # Per-module databases
  modules:
    orchestrator: "sqlite:///data/databases/orchestrator.db"
    file_reader: "sqlite:///data/databases/file_reader.db"
    text_normalizer: "sqlite:///data/databases/text_normalizer.db"
    latinizer: "sqlite:///data/databases/latinizer.db"
    legal_parser: "sqlite:///data/databases/legal_parser.db"
    legal_unit_extractor: "sqlite:///data/databases/legal_unit_extractor.db"
    assertion_extractor: "sqlite:///data/databases/assertion_extractor.db"
    entity_recognizer: "sqlite:///data/databases/entity_recognizer.db"
    condition_extractor: "sqlite:///data/databases/condition_extractor.db"
    assertion_classifier: "sqlite:///data/databases/assertion_classifier.db"
    embedding_generator: "sqlite:///data/databases/embedding_generator.db"
    vector_store: "sqlite:///data/databases/vector_store.db"
    keyword_indexer: "sqlite:///data/databases/keyword_indexer.db"
    hybrid_search: "sqlite:///data/databases/hybrid_search.db"
    ontology_matcher: "sqlite:///data/databases/ontology_matcher.db"
    reference_resolver: "sqlite:///data/databases/reference_resolver.db"
    definition_extractor: "sqlite:///data/databases/definition_extractor.db"
    candidate_finder: "sqlite:///data/databases/candidate_finder.db"
    conflict_detector: "sqlite:///data/databases/conflict_detector.db"
    severity_calculator: "sqlite:///data/databases/severity_calculator.db"
    recommendation_generator: "sqlite:///data/databases/recommendation_generator.db"
  
  # Database settings
  echo: false  # SQLAlchemy echo
  pool_size: 5
  max_overflow: 10
  pool_timeout: 30

