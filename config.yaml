      port: 8103
      url: "http://localhost:8103"
    
    legal_parser:
      host: "0.0.0.0"
      port: 8104
      url: "http://localhost:8104"
    
    legal_unit_extractor:
      host: "0.0.0.0"
      port: 8105
      url: "http://localhost:8105"
    
    # Assertion Processing Modules (8106-8109)
    assertion_extractor:
      host: "0.0.0.0"
      port: 8106
      url: "http://localhost:8106"
    
    entity_recognizer:
      host: "0.0.0.0"
      port: 8107
      url: "http://localhost:8107"
    
    condition_extractor:
      host: "0.0.0.0"
      port: 8108
      url: "http://localhost:8108"
    
    assertion_classifier:
      host: "0.0.0.0"
      port: 8109
      url: "http://localhost:8109"
    
    # Embedding & Search Modules (8110-8113)
    embedding_generator:
      host: "0.0.0.0"
